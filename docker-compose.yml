version: "3.8"

services:
  frontend:
    build:
      context: ./FocusHub-app
      dockerfile: Dockerfile
      target: development
    command: npm run start
    volumes:
      - ./FocusHub-app:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

  backend:
    build:
      context: ./focus-hub-backend
      dockerfile: Dockerfile
      target: development
    command: npm run start:dev
    volumes:
      - ./focus-hub-backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/db
      JWT_SECRET: hlaskdhaio1237891aa
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:14.4
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "35000:5432"

  postgres_admin:
    image: dpage/pgadmin4:6.12
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
