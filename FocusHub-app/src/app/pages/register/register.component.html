<div class="register-container">
  <div class="form-card">
    <h1>Create an Account</h1>
    <p class="subtitle">Enter your information to get started</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" formControlName="name" [ngClass]="{'invalid': registerForm.get('name')?.invalid && registerForm.get('name')?.touched}" />
        <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="error-text">
          Name is required
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" [ngClass]="{'invalid': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}" />
        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error-text">
          <ng-container *ngIf="registerForm.get('email')?.hasError('required')">Email is required</ng-container>
          <ng-container *ngIf="registerForm.get('email')?.hasError('email')">Enter a valid email</ng-container>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" [ngClass]="{'invalid': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}" />
        <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error-text">
          Password must be at least 8 characters
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" [ngClass]="{'invalid': registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched}" />
        <div *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched" class="error-text">
          Passwords do not match
        </div>
      </div>

      <button type="submit" [disabled]="isLoading" class="submit-btn">
        <span *ngIf="isLoading">Creating Account...</span>
        <span *ngIf="!isLoading">Create Account</span>
      </button>
      <mat-progress-spinner *ngIf="isLoading" mode="indeterminate"></mat-progress-spinner>
    </form>

    <div class="footer-text">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>
